<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kubernetes App</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #050d1a;
      --surface: #0a1628;
      --border: #1a2e4a;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --accent3: #10b981;
      --text: #e2f0ff;
      --muted: #4a6a8a;
      --glow: 0 0 30px rgba(0,229,255,0.18);
      --glow-strong: 0 0 60px rgba(0,229,255,0.28);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Animated background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridScroll 20s linear infinite;
      z-index: 0;
    }
    @keyframes gridScroll {
      from { background-position: 0 0; }
      to   { background-position: 48px 48px; }
    }

    /* ── Glowing orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.18;
      z-index: 0;
      animation: pulse 8s ease-in-out infinite alternate;
    }
    .orb-1 { width: 480px; height: 480px; background: var(--accent2); top: -120px; left: -120px; animation-delay: 0s; }
    .orb-2 { width: 360px; height: 360px; background: var(--accent);  bottom: -80px; right: -80px; animation-delay: 3s; }
    .orb-3 { width: 240px; height: 240px; background: var(--accent3); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: 6s; }
    @keyframes pulse {
      from { opacity: 0.12; transform: scale(1); }
      to   { opacity: 0.24; transform: scale(1.12); }
    }

    /* ── Main card ── */
    .card {
      position: relative;
      z-index: 1;
      width: min(520px, 90vw);
      background: rgba(10, 22, 40, 0.82);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 52px 48px 44px;
      backdrop-filter: blur(20px);
      box-shadow: var(--glow), 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
      animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }

    /* ── Top badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,229,255,0.08);
      border: 1px solid rgba(0,229,255,0.22);
      border-radius: 100px;
      padding: 5px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 28px;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent3);
      box-shadow: 0 0 8px var(--accent3);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Heading ── */
    h1 {
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #ffffff 0%, var(--accent) 60%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 38px;
      letter-spacing: 0.02em;
      font-family: 'Space Mono', monospace;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin-bottom: 36px;
    }

    /* ── Form elements ── */
    .field { margin-bottom: 24px; }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      font-family: 'Space Mono', monospace;
    }

    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 16px;
      pointer-events: none;
      transition: color 0.2s;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px 14px 44px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.97rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus {
      border-color: var(--accent);
      background: rgba(0,229,255,0.05);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.12), var(--glow);
    }
    input[type="text"]:focus + .input-focus-line { transform: scaleX(1); }

    /* ── Submit button ── */
    button[type="submit"] {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 4px 24px rgba(124,58,237,0.35), 0 0 0 0 rgba(0,229,255,0.2);
    }
    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(124,58,237,0.45), 0 0 30px rgba(0,229,255,0.2);
    }
    button[type="submit"]:active { transform: translateY(0); }
    button[type="submit"]::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    button[type="submit"]:hover::after { opacity: 1; }

    /* ── Message banner ── */
    .message {
      margin-top: 28px;
      padding: 16px 20px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 10px;
      color: var(--accent3);
      font-family: 'Space Mono', monospace;
      font-size: 0.88rem;
      line-height: 1.6;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      animation: msgIn 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: none; }
    }
    .message-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

    /* ── Footer stats ── */
    .stats {
      display: flex;
      gap: 24px;
      margin-top: 36px;
      padding-top: 28px;
      border-top: 1px solid var(--border);
    }
    .stat {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .stat-dot { color: var(--accent3); }
  </style>
</head>
<body>

  <!-- Background FX -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="card">

    <div class="badge">
      <span class="badge-dot"></span>
      CLUSTER STATUS: RUNNING
    </div>

    <h1>Hello,<br>Kubernetes.</h1>
    <p class="subtitle">// deployment test interface v1.0</p>
    <div class="divider"></div>

    <form method="POST" action="/">
      <div class="field">
        <label for="name">Identifier / Username</label>
        <div class="input-wrap">
          <span class="input-icon">⬡</span>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter your name..."
            autocomplete="off"
            required
          />
        </div>
      </div>

      <button type="submit">Deploy Greeting ›</button>
    </form>

    {% if message %}
    <div class="message">
      <span class="message-icon">✦</span>
      <span>{{ message }}</span>
    </div>
    {% endif %}

    <div class="stats">
      <div class="stat">
        <span class="stat-value">3 <span class="stat-dot">●</span></span>
        <span class="stat-label">Nodes Active</span>
      </div>
      <div class="stat">
        <span class="stat-value">99.9%</span>
        <span class="stat-label">Uptime</span>
      </div>
      <div class="stat">
        <span class="stat-value">v1.30</span>
        <span class="stat-label">K8s Version</span>
      </div>
    </div>

  </div>

</body>
</html>
